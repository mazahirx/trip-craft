<!-- Auth Shell -->
<main class="auth-card flex flex-col items-center">
<!-- Brand Header -->
<div class="mb-gap-lg text-center">
<h1 class="font-display text-display text-primary tracking-tight mb-base">TripCraft</h1>
<p class="font-body-lg text-body-lg text-text-secondary">Welcome back</p>
</div>
<!-- Social Login Component -->
<div class="w-full space-y-gap-sm mb-gap-lg">
<button class="w-full flex items-center justify-center gap-sm px-gap-md py-gap-sm border border-border-muted rounded bg-bg-canvas font-body-md text-body-md text-primary transition-soft hover:bg-hover-fill active:opacity-80">

                Continue with Google

<button class="w-full flex items-center justify-center gap-sm px-gap-md py-gap-sm border border-border-muted rounded bg-bg-canvas font-body-md text-body-md text-primary transition-soft hover:bg-hover-fill active:opacity-80">
<span class="material-symbols-outlined text-[18px]">apps</span>
                Continue with Apple
            </button>
</div>
<!-- Divider -->
<div class="w-full flex items-center gap-md mb-gap-lg">
<div class="h-[1px] flex-grow bg-border-subtle"></div>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">or</span>
<div class="h-[1px] flex-grow bg-border-subtle"></div>
</div>
<!-- Email Login Form -->
<form class="w-full space-y-gap-md" onsubmit="event.preventDefault();">
<div class="space-y-base">
<label class="font-label-md text-label-md text-text-secondary ml-base" for="email">Email</label>
<input class="w-full px-gap-md py-gap-sm border border-border-subtle rounded font-body-md text-body-md text-primary bg-bg-canvas transition-soft focus:border-primary" id="email" placeholder="Enter your email address..." type="email"/>
</div>
<div class="space-y-base">
<div class="flex justify-between items-center px-base">
<label class="font-label-md text-label-md text-text-secondary" for="password">Password</label>
<a class="font-label-md text-label-md text-text-secondary hover:text-primary transition-colors" href="#">Forgot?</a>
</div>
<input class="w-full px-gap-md py-gap-sm border border-border-subtle rounded font-body-md text-body-md text-primary bg-bg-canvas transition-soft focus:border-primary" id="password" placeholder="Enter your password..." type="password"/>
</div>
<button class="w-full py-gap-sm bg-primary text-on-primary font-body-md text-body-md rounded transition-soft hover:opacity-90 active:opacity-80" type="submit">
                Continue
            </button>
</form>

<footer class="mt-gap-lg pt-gap-lg border-t border-border-subtle w-full text-center">
<p class="font-body-md text-body-md text-text-secondary mb-gap-sm">

            </p>
<a class="inline-flex items-center gap-xs font-body-md text-body-md text-primary hover:underline decoration-1 underline-offset-4 transition-soft group" href="#">

</a>

<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Terms of Service</a>
</div>
</footer>

<!-- Visual Element: Subtle background accent -->
<div class="fixed top-0 left-0 w-full h-1 bg-primary"></div>
<!-- Micro-interaction script -->
<script>
        // Simple input focus effects or validation placeholders
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').style.color = '#000000';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').style.color = '#5F5E5B';
            });
        });

        // Toggle Password visibility logic could be added here if needed
    </script>
